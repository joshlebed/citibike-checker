AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Citi Bike station availability checker

Parameters:
  BudgetEmail:
    Type: String
    Description: Email address that receives AWS Budget threshold notifications
  BudgetMonthlyLimitUsd:
    Type: Number
    Default: 5
    Description: Monthly USD budget cap; alerts fire at 50%, 80%, and forecasted 100%

Globals:
  Function:
    Runtime: python3.11
    Timeout: 10
    MemorySize: 256
    Architectures:
      - arm64

Resources:
  CitibikeApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"
      # No auth: API is public, protected by WAF rate limit + stage throttle
      # + per-request hardening + monthly budget alarm. See CitibikeWebACL
      # below and the Cost controls section in README.md for the full story.
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5

  # Log groups with short retention: logs are only kept long enough to debug
  # recent issues. At scale (e.g. abuse), this caps CloudWatch storage cost.
  CitibikeCheckLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${CitibikeCheckFunction}
      RetentionInDays: 1

  CitibikeCheckEnglishLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${CitibikeCheckEnglishFunction}
      RetentionInDays: 1

  CitibikeCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_app.handler.citibike_check
      CodeUri: src/
      # ReservedConcurrentExecutions intentionally omitted: this AWS account
      # has a total concurrency limit of 10 and the unreserved pool must stay
      # at >= 10, so no per-function reservation is possible. The account-wide
      # cap of 10 already serves as the hard ceiling.
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          GBFS_TIMEOUT_S: "8"
      Events:
        PostCitibikeCheck:
          Type: Api
          Properties:
            RestApiId: !Ref CitibikeApi
            Path: /citibike-check
            Method: POST

  CitibikeCheckEnglishFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_app.handler.citibike_check_english
      CodeUri: src/
      # See note on CitibikeCheckFunction — reserved concurrency unavailable
      # on this account due to the 10-execution total limit.
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          GBFS_TIMEOUT_S: "8"
      Events:
        PostCitibikeCheckEnglish:
          Type: Api
          Properties:
            RestApiId: !Ref CitibikeApi
            Path: /citibike-check-english
            Method: POST

  # CloudWatch Alarms for errors
  CitibikeCheckErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: citibike-checker-json-errors
      AlarmDescription: Errors in CitibikeCheckFunction
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref CitibikeCheckFunction
      TreatMissingData: notBreaching

  CitibikeCheckEnglishErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: citibike-checker-english-errors
      AlarmDescription: Errors in CitibikeCheckEnglishFunction
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref CitibikeCheckEnglishFunction
      TreatMissingData: notBreaching

  # Account-wide monthly budget. Tracks all spend in this AWS account
  # (no CostFilters), so use a dedicated AWS account or add filters
  # if you share the account with other projects.
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "${AWS::StackName}-monthly"
        BudgetLimit:
          Amount: !Ref BudgetMonthlyLimitUsd
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 50
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetEmail
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetEmail

  # WAFv2 Web ACL with a rate-based rule. WAF inspects requests before they
  # reach API Gateway and blocks IPs sending more than 500 requests in any
  # 5-minute window. Blocked requests do not incur API Gateway charges,
  # which protects against billing-amplification DDoS while leaving plenty
  # of headroom for legitimate Shortcut and web app testing from a single IP.
  CitibikeWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${AWS::StackName}-webacl"
      Description: Rate-limiting WAF for citibike-checker API Gateway
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AWS::StackName}-webacl"
      Rules:
        - Name: RateLimitPerIP
          Priority: 1
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 500
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-rate-limit"

  CitibikeWebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/restapis/${CitibikeApi}/stages/prod"
      WebACLArn: !GetAtt CitibikeWebACL.Arn

Outputs:
  ApiBaseUrl:
    Description: Base URL for the API Gateway stage
    Value: !Sub "https://${CitibikeApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  CitibikeCheckEndpoint:
    Description: JSON endpoint
    Value: !Sub "https://${CitibikeApi}.execute-api.${AWS::Region}.amazonaws.com/prod/citibike-check"
  CitibikeCheckEnglishEndpoint:
    Description: English endpoint
    Value: !Sub "https://${CitibikeApi}.execute-api.${AWS::Region}.amazonaws.com/prod/citibike-check-english"
  WebAclArn:
    Description: ARN of the WAFv2 WebACL protecting the API
    Value: !GetAtt CitibikeWebACL.Arn
